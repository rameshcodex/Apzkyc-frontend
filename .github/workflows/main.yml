name: Deploy React App to Server
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Cache optimization check
        run: |
          pip install 'pymongo[srv]' dnspython --quiet
          python3 scripts/mongo_test.py 2>&1 | tee result_cache.txt
          cat result_cache.txt
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-result
          path: result_cache.txt
